      <h1>Goku calvo</h1>
      <p>
       Desde 1989, quando Goku tinge o cabelo de amarelo pela primeira vez (se transforma em Super Saiyajin).
       Depois de 37 anos tingindo o cabelo, hoje saiu a terrivél notícia, que ele ficou calvo.
      </p>
